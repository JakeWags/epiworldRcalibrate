name: pkgdown

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  pull-requests: write
  actions: read

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      # ---------------------------------------------------------
      # 0. Checkout
      # ---------------------------------------------------------
      - uses: actions/checkout@v4

      # ---------------------------------------------------------
      # 1. Install R
      # ---------------------------------------------------------
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      # ---------------------------------------------------------
      # 2. Install Quarto (FIXES YOUR ERROR)
      # ---------------------------------------------------------
      - uses: quarto-dev/quarto-actions/setup@v2

      - name: Make Quarto visible to R
        run: |
          echo "QUARTO_PATH=$(which quarto)" >> $GITHUB_ENV
          quarto --version

      # ---------------------------------------------------------
      # 3. Install R dependencies
      # ---------------------------------------------------------
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::pkgdown
            any::reticulate
            any::knitr
            any::rmarkdown
          needs: website

      # ---------------------------------------------------------
      # 4. Install Python for reticulate
      # ---------------------------------------------------------
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install torch --index-url https://download.pytorch.org/whl/cpu
          python -m pip install numpy joblib scikit-learn matplotlib pandas

      - name: Set RETICULATE_PYTHON
        run: |
          echo "RETICULATE_PYTHON=$(which python)" >> $GITHUB_ENV

      # ---------------------------------------------------------
      # 5. Install the R package
      # ---------------------------------------------------------
      - name: Install epiworldRcalibrate
        run: R CMD INSTALL .

      # ---------------------------------------------------------
      # 6. Temporarily hide heavy vignettes
      # ---------------------------------------------------------
      - name: Hide intensive vignettes
        run: |
          mkdir -p vignettes_temp
          mv vignettes/ABC_LSTM.qmd vignettes_temp/ 2>/dev/null || true

      # ---------------------------------------------------------
      # 7. Build pkgdown site (IMPORTANT FIX)
      # ---------------------------------------------------------
      - name: Build pkgdown site
        run: |
          Rscript -e '
            Sys.setenv(
              RETICULATE_PYTHON = Sys.which("python"),
              QUARTO_PATH = Sys.which("quarto")
            )
            pkgdown::build_site_github_pages(
              new_process = TRUE,
              install = FALSE
            )
          '

      # ---------------------------------------------------------
      # 8. Upload Pages artifact
      # ---------------------------------------------------------
      - name: Upload Pages artifact
        if: github.event_name != 'pull_request' &&
            (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      # ---------------------------------------------------------
      # 9. Upload PR preview
      # ---------------------------------------------------------
      - name: Upload PR artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: pkgdown-site
          path: docs

      - name: Post artifact link to PR
        if: github.event_name == 'pull_request'
        uses: CDCgov/cfa-actions/post-artifact@v1.2.0
        with:
          artifact-name: pkgdown-site
          gh-token: ${{ secrets.GITHUB_TOKEN }}
          message: >
            Thank you for your contribution @${{ github.actor }} 🚀!
            The pkgdown site preview is ready 👉 [Download here]({ artifact-url })

  deploy:
    if: github.event_name != 'pull_request' &&
        (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
