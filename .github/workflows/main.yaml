on:
  push:
    branches: [main, master]
  workflow_dispatch:

name: pkgdown

jobs:
  pkgdown:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: pre-release

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libxml2-dev libssl-dev

      # ---------- Python + Torch (+extras) for reticulate ----------
      - name: Set up Python for reticulate
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install CPU-only torch + extras for reticulate
        run: |
          python -m pip install --upgrade pip
          python -m pip install --index-url https://download.pytorch.org/whl/cpu torch
          python -m pip install numpy joblib scikit-learn

      - name: Tell reticulate which Python to use
        run: echo "RETICULATE_PYTHON=$(which python)" >> $GITHUB_ENV
      # -------------------------------------------------------------

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::pkgdown, any::xml2, any::quarto
          needs: website

      - name: Verify Quarto installation
        run: |
          quarto --version
          which quarto

      # Install the package (no need to build vignettes here; pkgdown renders)
      - name: Install package
        run: R CMD INSTALL . --no-html --no-multiarch

      - name: Build site
        run: |
          Rscript -e "library(pkgdown); build_site_github_pages(new_process = FALSE, install = FALSE, quiet = FALSE)"

      - name: Deploy to GitHub pages
        uses: JamesIves/github-pages-deploy-action@v4.5.0
        with:
          branch: main
          folder: docs
