name: pkgdown-site

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Setup Pandoc
        uses: r-lib/actions/setup-pandoc@v2

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcurl4-openssl-dev \
            libharfbuzz-dev \
            libfribidi-dev \
            libfreetype6-dev \
            libpng-dev \
            libtiff5-dev \
            libjpeg-dev

      - name: Install R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::pkgdown
            any::knitr
            any::rmarkdown
            any::quarto
            any::tidyverse
            any::ggplot2
            any::epiworldR
            any::tictoc
            any::data.table
            any::dplyr
            any::tidyr
          needs: website

      - name: Install package
        run: R CMD INSTALL .

      - name: Verify Quarto installation
        run: |
          quarto --version
          quarto check

      - name: Test render single vignette
        run: |
          cd vignettes
          quarto render calibration_explanation.qmd --to html
        continue-on-error: true

      - name: Build pkgdown site with verbose output
        run: |
          Rscript -e '
            options(pkgdown.internet = TRUE)
            pkgdown::build_site(
              new_process = FALSE,
              install = FALSE,
              preview = FALSE,
              devel = FALSE
            )
          '

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
