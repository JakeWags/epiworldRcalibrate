name: pkgdown-site

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy tensorflow keras

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Setup Pandoc
        uses: r-lib/actions/setup-pandoc@v2

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcurl4-openssl-dev \
            libharfbuzz-dev \
            libfribidi-dev \
            libfreetype6-dev \
            libpng-dev \
            libtiff5-dev \
            libjpeg-dev

      - name: Install R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::pkgdown
            any::knitr
            any::rmarkdown
            any::quarto
            any::tidyverse
            any::ggplot2
            any::epiworldR
            any::tictoc
            any::data.table
            any::dplyr
            any::tidyr
            any::reticulate
          needs: website

      - name: Configure reticulate
        run: |
          Rscript -e '
            reticulate::use_python(Sys.which("python"), required = TRUE)
            cat("Python path:", reticulate::py_config()$python, "\n")
          '

      - name: Build vignettes and copy to inst/doc
        run: |
          Rscript -e '
            reticulate::use_python(Sys.which("python"), required = TRUE)

            # Render all .qmd vignettes
            vignette_files <- list.files("vignettes", pattern = "\\.qmd$", full.names = TRUE)
            message("Found vignettes: ", paste(basename(vignette_files), collapse = ", "))

            for (f in vignette_files) {
              message("Rendering: ", f)
              quarto::quarto_render(f)
            }

            # Create inst/doc directory
            dir.create("inst/doc", recursive = TRUE, showWarnings = FALSE)

            # Copy HTML files
            html_files <- list.files("vignettes", pattern = "\\.html$", full.names = TRUE)
            if (length(html_files) > 0) {
              file.copy(html_files, "inst/doc/", overwrite = TRUE)
              message("Copied HTML files: ", paste(basename(html_files), collapse = ", "))
            }

            # Copy QMD source files
            qmd_files <- list.files("vignettes", pattern = "\\.qmd$", full.names = TRUE)
            if (length(qmd_files) > 0) {
              file.copy(qmd_files, "inst/doc/", overwrite = TRUE)
              message("Copied QMD files: ", paste(basename(qmd_files), collapse = ", "))
            }

            # Copy supporting files directories if they exist
            file_dirs <- list.files("vignettes", pattern = "_files$", full.names = TRUE)
            if (length(file_dirs) > 0) {
              for (d in file_dirs) {
                dir.create(file.path("inst/doc", basename(d)), recursive = TRUE, showWarnings = FALSE)
                file.copy(d, "inst/doc/", recursive = TRUE, overwrite = TRUE)
              }
              message("Copied supporting directories: ", paste(basename(file_dirs), collapse = ", "))
            }
          '

      - name: Install package
        run: R CMD INSTALL .

      - name: Build pkgdown site
        run: |
          Rscript -e 'pkgdown::build_site(new_process = FALSE, install = FALSE)'

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
