name: pkgdown

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: write

jobs:
  pkgdown:
    runs-on: ubuntu-latest

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      # ---------------------------------------------------------
      # 1. Install R
      # ---------------------------------------------------------
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      # ---------------------------------------------------------
      # 2. Install R package dependencies
      # ---------------------------------------------------------
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::pkgdown
            any::reticulate
          needs: website

      # ---------------------------------------------------------
      # 3. Install Python for reticulate
      # ---------------------------------------------------------
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies for model + vignette
        run: |
          python -m pip install --upgrade pip
          python -m pip install torch --index-url https://download.pytorch.org/whl/cpu
          python -m pip install numpy joblib scikit-learn

      # ⭐ CRITICAL FIX ⭐
      # Prevent reticulate from using uv automatic Python
      # and force it to use THIS Python everywhere (including pkgdown)
      - name: Set RETICULATE_PYTHON
        run: echo "RETICULATE_PYTHON=$(which python)" >> $GITHUB_ENV

      # ---------------------------------------------------------
      # 4. Build pkgdown website
      # ---------------------------------------------------------
      - name: Build pkgdown site
        run: Rscript -e 'pkgdown::build_site()'

      # ---------------------------------------------------------
      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: docs
