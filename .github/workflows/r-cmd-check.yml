name: R-CMD-check

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
  R_KEEP_PKG_SOURCE: yes

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}
    name: ${{ matrix.config.os }} (${{ matrix.config.r }})
    strategy:
      fail-fast: false
      matrix:
        config:
          - { os: macOS-latest,   r: 'release' }
          - { os: windows-latest, r: 'release' }
          - { os: windows-latest, r: 'devel',  http-user-agent: 'release' }
          - { os: ubuntu-latest,  r: 'devel',  http-user-agent: 'release' }
          - { os: ubuntu-latest,  r: 'release' }
          - { os: ubuntu-latest,  r: 'oldrel' }

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      # Ubuntu release = full check WITH vignettes
      - name: Check package (Ubuntu release - with vignettes)
        if: runner.os == 'Linux' && matrix.config.r == 'release'
        uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true

      # All other OS/R combos = skip vignettes
      - name: Check package (other platforms - no vignettes)
        if: runner.os != 'Linux' || matrix.config.r != 'release'
        uses: r-lib/actions/check-r-package@v2
        with:
          build_args: 'c("--no-build-vignettes", "--no-manual")'
          args: 'c("--as-cran", "--no-manual", "--ignore-vignettes")'
          upload-snapshots: true

      # --------------------------------------------------------------------------
      # Build tarballs
      # --------------------------------------------------------------------------

      - name: Build tarball (Ubuntu release, with vignettes)
        if: runner.os == 'Linux' && matrix.config.r == 'release'
        run: R CMD build .

      - name: Upload built package
        if: runner.os == 'Linux' && (matrix.config.r == 'release')
        uses: actions/upload-artifact@v4
        with:
          name: epiworldRcalibrate-built-package-${{ matrix.config.os }}-${{ matrix.config.r }}
          path: epiworldRcalibrate_*.tar.gz
          retention-days: 7
