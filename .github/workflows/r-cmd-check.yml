# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# This version:
# - Installs Python + torch + scikit-learn on Ubuntu for reticulate
# - Builds vignettes only on ubuntu-latest (R release)
# - Skips vignettes elsewhere for speed/reliability
# - Uses valid inputs for r-lib/actions/check-r-package@v2
# - Builds tarballs as artifacts

name: R-CMD-check

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
  R_KEEP_PKG_SOURCE: yes

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}
    name: ${{ matrix.config.os }} (${{ matrix.config.r }})
    strategy:
      fail-fast: false
      matrix:
        config:
          - { os: macOS-latest,   r: 'release' }
          - { os: windows-latest, r: 'release' }
          - { os: windows-latest, r: 'devel',  http-user-agent: 'release' }
          - { os: ubuntu-latest,  r: 'devel',  http-user-agent: 'release' }
          - { os: ubuntu-latest,  r: 'release' }
          - { os: ubuntu-latest,  r: 'oldrel' }

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      # ---------- Python + Torch (+extras) for reticulate (Ubuntu only) ----------
      - name: Set up Python for reticulate
        if: runner.os == 'Linux'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install CPU-only torch + extras for reticulate
        if: runner.os == 'Linux'
        run: |
          python -m pip install --upgrade pip
          python -m pip install torch --index-url https://download.pytorch.org/whl/cpu
          python -m pip install numpy joblib scikit-learn

      - name: Tell reticulate which Python to use
        if: runner.os == 'Linux'
        run: echo "RETICULATE_PYTHON=$(which python)" >> $GITHUB_ENV
      # --------------------------------------------------------------------------

      # Primary check: Ubuntu (release) builds vignettes (Python deps available)
      - name: Check package (Ubuntu release - with vignettes)
        if: runner.os == 'Linux' && matrix.config.r == 'release'
        uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          error-on: error   # ← changed here

      # Other matrix entries: skip vignettes for speed/stability
      - name: Check package (other platforms - no vignettes)
        if: runner.os != 'Linux' || matrix.config.r != 'release'
        uses: r-lib/actions/check-r-package@v2
        with:
          build_args: 'c("--no-build-vignettes", "--no-manual")'
          args: 'c("--as-cran", "--no-manual", "--ignore-vignettes")'
          upload-snapshots: true
          error-on: error   # ← changed here

      # Build tarballs as artifacts
      - name: Build tarball (Ubuntu release, with vignettes)
        if: runner.os == 'Linux' && matrix.config.r == 'release'
        run: R CMD build . --no-manual

      - name: Build tarball (Ubuntu devel, no vignettes)
        if: runner.os == 'Linux' && matrix.config.r == 'devel'
        run: R CMD build . --no-build-vignettes --no-manual

      - name: Upload built package
        if: runner.os == 'Linux' && (matrix.config.r == 'release' || matrix.config.r == 'devel')
        uses: actions/upload-artifact@v4
        with:
          name: epiworldRcalibrate-built-package-${{ matrix.config.os }}-${{ matrix.config.r }}
          path: epiworldRcalibrate_*.tar.gz
          retention-days: 7
