url: https://sima-njf.github.io/epiworldRcalibrate/

template:
  bootstrap: 5
  bslib:
    preset: bootstrap

build:
  new_process: false

vignettes:
  strip_header: false

navbar:
  title: "epiworldRcalibrate"
  left:
    - text: "Get Started"
      href: articles/calibration_explanation.html
    - text: "Articles"
      menu:
        - text: "Introduction to Calibration"
          href: articles/calibration_explanation.html
        - text: "Real Data Example"
          href: articles/Real_data.html
        - text: "ABC + BiLSTM Calibration"
          href: articles/ABC_LSTM.html
    - text: "Reference"
      href: reference/index.html
  right:
    - icon: fab fa-github
      href: "https://github.com/sima-njf/epiworldRcalibrate"
      aria-label: "GitHub"

home:
  title: "BiLSTM Parameter Calibration for epiworldR"
  description: >
    Fast, deep-learning-based calibration of SIR model parameters
    using Approximate Bayesian Computation (ABC) and BiLSTM neural networks.

authors:
  sima-njf:
    href: "https://github.com/sima-njf"

articles:
  - title: "Getting Started"
    navbar: ~
    contents:
      - calibration_explanation
      - Real_data
      - ABC_LSTM

footer:
  structure:
    left: [developed_by, built_with]
    right: [package]
  components:
    developed_by: "Developed by [Sima Najafzadehkhoei](https://github.com/sima-njf)"
    built_with: "Built with [pkgdown](https://pkgdown.r-lib.org/)"
    package: "epiworldRcalibrate"
