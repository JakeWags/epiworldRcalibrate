template:
  bootstrap: 5

navbar:
  title: "epiworldRcalibrate"
  left:
    - text: "Get Started"
      href: articles/calibration-explanation.html
    - text: "Reference"
      href: reference/index.html
  right:
    - icon: fab fa-github
      href: "https://github.com/sima-njf/epiworldRcalibrate"

home:
  title: "BiLSTM Parameter Calibration for epiworldR"
  description: "Fast, deep-learning-based calibration of SIR model parameters using BiLSTM neural networks"

authors:
  sima-njf:
    href: "https://github.com/sima-njf"

articles:
  - title: "Getting Started"
    navbar: ~
    contents:
      - calibration_explanation

